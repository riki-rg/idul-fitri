<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selamat Hari Raya Idul Fitri</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh; 
      font-family: 'Poppins', sans-serif;
      background-color: #0b1d3a; 
      background: radial-gradient(circle at center, #0b1d3a, #000814);
      overflow: hidden;
      color: white;
      touch-action: manipulation;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background: transparent;
    }

    .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .star {
      position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%;
      animation: twinkle 2s infinite;
    }
    @keyframes twinkle { 0%,100% {opacity:.2} 50% {opacity:1} }

    .moon {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, #fff, #ccc);
      border-radius: 50%;
      box-shadow: 0 0 60px rgba(255,255,255,0.8);
      z-index: 2; 
      transition: top 1.5s ease, transform 1.5s ease;
      pointer-events: none;
    }

    .moon.up {
      top: 20%;
      transform: translate(-50%, -50%) scale(0.8);
    }

    .moon::after {
      content: "";
      position: absolute;
      width: 100%; height: 100%; border-radius: 50%;
      box-shadow: inset -20px -10px 40px rgba(0,0,0,0.3);
    }

    .container {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10; 
      width: 90%;
      max-width: 500px;
      display: none;
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: none;
    }

    .glass {
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 25px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 1.4rem;
      line-height: 1.5;
      margin: 0;
      color: #ffd700; 
    }

    p {
      font-size: 0.95rem;
      margin-top: 15px;
      white-space: pre-line;
      line-height: 1.6;
    }

    .btn {
      position: absolute;
      top: 70%;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 25px;
      border: none;
      background: linear-gradient(45deg, #ffd700, #ffaa00);
      color: black;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
      animation: pulse 2s infinite;
      z-index: 20; 
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    }

    @keyframes pulse {
      0% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.05); }
      100% { transform: translateX(-50%) scale(1); }
    }
  </style>
</head>
<body>

<audio id="bgMusic" loop>
  <source src="fitri.mp3" type="audio/mpeg">
</audio>
<div class="stars" id="stars"></div>
<canvas id="fireworks"></canvas>
<div class="moon" id="moon"></div>

<button class="btn" id="startBtn" onclick="start(event)">Buka Ucapan ✨</button>

<div class="container" id="content">
  <div class="glass">
    <h1 id="textMain"></h1>
    <p id="textSub"></p>
  </div>
</div>

<script>
const canvas = document.getElementById('fireworks');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const starsContainer = document.getElementById("stars");
for (let i = 0; i < 150; i++) {
  const star = document.createElement("div");
  star.classList.add("star");
  star.style.top = Math.random() * 100 + "%";
  star.style.left = Math.random() * 100 + "%";
  star.style.animationDuration = (Math.random() * 3 + 2) + "s";
  starsContainer.appendChild(star);
}

function typeEffect(element, text, speed = 40) {
  let i = 0;
  element.textContent = ""; 
  function typing() {
    if (i < text.length) {
      element.textContent += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

function createFirework(x, y) {
  const colors = ['#ff0000', '#ffd700', '#00ff00', '#00ffff', '#ff00ff', '#ffffff'];
  const color = colors[Math.floor(Math.random() * colors.length)];
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      color: color,
      life: 100
    });
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05; 
    p.life -= 1.5;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(0, p.life / 100); 
    ctx.fill();
    ctx.globalAlpha = 1;

    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
  requestAnimationFrame(animate);
}

window.addEventListener('click', (e) => {
  if(e.target.id === 'startBtn') return;
  createFirework(e.clientX, e.clientY);
});

function start(e) {
  if(e) e.stopPropagation(); 

  // --- PLAY MUSIK NYA DI SINI BRO ---
  const bgMusic = document.getElementById('bgMusic');
  // Pake catch biar browser gak error kalo file MP3-nya belum lo masukin
  bgMusic.play().catch(error => console.log("Musik belum di-load atau diblokir browser"));
  // ----------------------------------

  document.getElementById('startBtn').style.display = 'none';
  
  const content = document.getElementById('content');
  content.style.display = 'block';
  setTimeout(() => content.style.opacity = '1', 50);

  document.getElementById('moon').classList.add('up');

  const year = new Date().getFullYear();
  const hijriYear = Math.floor((year - 622) * 33 / 32);
  
  const mainText = "Kami sekeluarga mengucapkan\nSelamat Hari Raya Idul Fitri " + hijriYear + " H";
  const subText = "Mohon maaf lahir dan batin, apabila ada salah kata dan perbuatan yang pernah menyakiti.\n\nPergi ke taman memetik melati,\nHarumnya semerbak di pagi hari.\nDi hari fitri kita sucikan hati,\nSemoga bahagia menyertai hari ini.\n\n" + year + " M";

  typeEffect(document.getElementById('textMain'), mainText, 45);
  setTimeout(() => {
    typeEffect(document.getElementById('textSub'), subText, 25);
  }, 2000);

  setInterval(() => {
    createFirework(
      Math.random() * canvas.width, 
      (Math.random() * canvas.height * 0.5) 
    );
  }, 1200);
}

animate();
</script>

</body>
</html>
